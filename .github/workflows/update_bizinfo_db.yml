name: Update Internal Policy DB

on:
  workflow_dispatch:
  schedule:
    # 매일 한국시간 오전 3시 = UTC 전날 18:00
    - cron: "0 18 * * *"

permissions:
  contents: write

concurrency:
  group: update-internal-policy-db
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas openpyxl

      - name: Collect Bizinfo programs
        env:
          BIZINFO_API_KEY: ${{ secrets.BIZINFO_API_KEY }}
        run: |
          python collector.py \
            --output-dir data \
            --pages 10 \
            --page-size 100 \
            --source github-actions \
            --strict

      - name: Collect optional external policy sources
        env:
          KSTARTUP_API_URL: ${{ secrets.KSTARTUP_API_URL }}
          KSTARTUP_API_KEY: ${{ secrets.KSTARTUP_API_KEY }}
          KSTARTUP_API_PARAMS_JSON: ${{ secrets.KSTARTUP_API_PARAMS_JSON }}
          KOSMES_API_URL: ${{ secrets.KOSMES_API_URL }}
          KOSMES_API_KEY: ${{ secrets.KOSMES_API_KEY }}
          KOSMES_API_PARAMS_JSON: ${{ secrets.KOSMES_API_PARAMS_JSON }}
        run: |
          python scheduled_policy_sync.py

      - name: Commit refreshed internal DB
        run: |
          git config user.name "oasistax-bot"
          git config user.email "actions@users.noreply.github.com"
          git add \
            data/bizinfo_programs.json \
            data/bizinfo_metadata.json \
            data/기업마당_공고DB.xlsx \
            data/external_policy_programs.json \
            data/external_policy_metadata.json
          if git diff --cached --quiet; then
            echo "변경된 내부 정책DB가 없습니다."
          else
            git commit -m "chore: 새벽 3시 내부 정책DB 자동 갱신"
            git push
          fi
